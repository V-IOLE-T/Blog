name: Deploy Frontend to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-frontend-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and Deploy to Vercel (Production)
        working-directory: apps/web
        run: |
          pnpm dlx vercel@47.0.5 pull --yes --environment=production --token="$VERCEL_TOKEN"
          pnpm dlx vercel@47.0.5 build --prod --token="$VERCEL_TOKEN"
          pnpm dlx vercel@47.0.5 deploy --prebuilt --prod --token="$VERCEL_TOKEN"
