name: Legacy Remote Deploy Trigger (Manual Rollback Only)

# Legacy deploy chain: reserved for emergency manual rollback.
# 主链路已迁移到 .github/workflows/vercel-frontend-deploy.yml。
on:
  workflow_dispatch:

permissions: {}

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Workflow in Another Repository
        run: |
          # Set the required variables
          repo_owner="innei"
          repo_name="shiroi-remote-deploy"
          event_type="trigger-workflow"

          curl -L --fail-with-body --show-error --silent \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/$repo_owner/$repo_name/dispatches \
            -d "{\"event_type\": \"$event_type\", \"client_payload\": {}}"
